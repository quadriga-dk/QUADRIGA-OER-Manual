chapters:
- title: Struktur und didaktisches Konzept
  url: https://quadriga-dk.github.io/QUADRIGA-OER-Manual/struktur_didaktisches_konzept/einleitung.html
  description: Dieses Kapitel stellt die Struktur des Templates und das zugrunde liegende
    didaktische Konzept vor.
  time-required: PT2H
  learning-goal: Sie kennen und verstehen das fallstudienbasierte didaktische Konzept
    von QUADRIGA für die Gestaltung von OER.
  learning-objectives:
  - learning-objective: Der forschungsgeleitete Ansatz der QUADRIGA OERs kann erläutert
      und der Beitrag von Fallstudien zur Datenkompetenzvermittlung erklärt werden.
    competency: Orientierungswissen
    data-flow: übergreifend
    blooms-category: 2 Verstehen
  - learning-objective: Die hierarchische Struktur der Lernziele in QUADRIGA OERs
      kann beschrieben und der Zusammenhang zwischen Fallstudienstruktur, Datenlebenszyklus
      und Lernzielen erläutert werden.
    competency: Orientierungswissen
    data-flow: übergreifend
    blooms-category: 2 Verstehen
  - learning-objective: Die zentralen didaktischen Komponenten einer QUADRIGA OER
      können identifiziert und deren Funktion im Lernprozess erklärt werden.
    competency: Orientierungswissen
    data-flow: übergreifend
    blooms-category: 2 Verstehen
- title: Technologie
  url: https://quadriga-dk.github.io/QUADRIGA-OER-Manual/technologie/einleitung.html
  description: Es werden die verschiedenen Bestandteile des Templates sowie die Technologien,
    welche genutzt werden, vorgestellt. Besonderes Augenmerk liegt auf dem Zusammenspiel
    der einzelnen Elemente.
  time-required: PT5H
  learning-goal: Sie kennen die verschiedenen technologischen Bestandteile von QUADRIGA
    OER und ihr Zusammenspiel.
  learning-objectives:
  - learning-objective: Die Bestandteile der Entwicklungsumgebung (Git, Python, Jupyter
      Book, Editor) können identifiziert und deren Funktionen im OER-Entwicklungsprozess
      erläutert werden.
    competency: Orientierungswissen
    data-flow: übergreifend
    blooms-category: 2 Verstehen
  - learning-objective: Der Unterschied zwischen Jupyter Book und Jupyter Notebook
      kann erklärt und deren jeweilige Rolle im Entwicklungsworkflow beschrieben werden.
    competency: Orientierungswissen
    data-flow: übergreifend
    blooms-category: 2 Verstehen
  - learning-objective: Die automatische Website-Erstellung über GitHub Actions kann
      erklärt und der Vorteil gegenüber manueller lokaler Entwicklung bewertet werden.
    competency: Orientierungswissen
    data-flow: übergreifend
    blooms-category: 2 Verstehen
  - learning-objective: Die Installation und Einrichtung einer lokalen Entwicklungsumgebung
      mit Python/Anaconda kann durchgeführt und Virtual Environments für projektspezifische
      Anforderungen erstellt werden.
    competency: Orientierungswissen
    data-flow: übergreifend
    blooms-category: 3 Anwenden
  - learning-objective: Der Unterschied zwischen Texteditoren und Textprozessoren
      für die Code-Entwicklung kann erklärt und geeignete Editoren wie VS Code für
      die OER-Entwicklung ausgewählt werden.
    competency: Orientierungswissen
    data-flow: übergreifend
    blooms-category: 2 Verstehen
